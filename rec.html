<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-tertiary: #f1f5f9;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-border-tertiary: rgba(0,0,0,0.07);
  --color-border-secondary: rgba(0,0,0,0.15);
  --color-border-primary: rgba(0,0,0,0.25);
  --color-background-info: #eff6ff;
  --color-text-info: #1d4ed8;
  --color-background-success: #f0fdf4;
  --color-text-success: #166534;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-serif: Georgia, serif;
  --font-mono: Consolas, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
*{box-sizing:border-box;}
body{font-family:var(--font-sans);background:#fff;margin:0;padding:20px;}

*{box-sizing:border-box;margin:0;padding:0;}
.rj{font-family:var(--font-sans);padding:1.5rem 0;}

/* Progress bar */
.prog{display:flex;align-items:center;margin-bottom:32px;overflow-x:auto;padding-bottom:4px;}
.prog-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;}
.prog-connector{flex:1;min-width:16px;height:2px;background:var(--color-border-tertiary);transition:background .4s;margin-top:-22px;z-index:0;}
.prog-connector.done{background:var(--ph-c,#378ADD);}
.prog-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1;}
.prog-dot{width:42px;height:42px;border-radius:50%;border:2px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--color-text-tertiary);background:var(--color-background-primary);transition:all .35s;}
.prog-dot.active{transform:scale(1.12);}
.prog-dot.done{color:#fff;border-width:0;}
.prog-dot-label{font-size:9px;font-weight:500;color:var(--color-text-tertiary);text-align:center;white-space:nowrap;max-width:72px;line-height:1.3;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.35;}100%{transform:scale(1.7);opacity:0;}}
@keyframes chipGlow{0%,100%{border-color:#AFA9EC;}50%{border-color:#7F77DD;}}
@keyframes dash{to{stroke-dashoffset:-20;}}
.phase-body{animation:fadeUp .35s ease forwards;}

/* Headers */
.ph-eyebrow{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.ph-title{font-size:24px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;}
.ph-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:24px;}

/* Entry / invite */
.invite-box{border-radius:14px;padding:22px 24px;text-align:center;border:2px solid;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s;margin-bottom:12px;}
.invite-box:hover{transform:scale(1.01);}
.invite-pulse{position:absolute;inset:0;border-radius:14px;border:2px solid;animation:pulseRing 2.2s ease-out infinite;}
.invite-title{font-size:19px;font-weight:500;margin-bottom:4px;position:relative;}
.invite-sub{font-size:12px;position:relative;}

/* Step stepper */
.stepper{display:flex;flex-direction:column;margin-bottom:16px;}
.step-row{display:flex;gap:16px;}
.step-left{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;}
.step-ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;border:2px solid;flex-shrink:0;}
.step-content{flex:1;padding-bottom:18px;}
.step-card{border-radius:12px;padding:14px 16px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);}
.step-card-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;}
.step-card-body{font-size:11px;color:var(--color-text-secondary);line-height:1.55;}
.chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;margin-left:6px;}
.ai-chip{background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC;animation:chipGlow 2.5s ease-in-out infinite;}
.int-chip{background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB;}

/* Cards grid */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.feat-card{border-radius:12px;padding:14px;border:0.5px solid;position:relative;overflow:hidden;transition:transform .2s;}
.feat-card:hover{transform:translateY(-2px);}
.feat-card-bar{position:absolute;top:0;left:0;width:4px;height:100%;}
.feat-card-num{font-size:40px;font-weight:500;position:absolute;right:10px;top:4px;line-height:1;opacity:.07;}
.feat-card-title{font-size:12px;font-weight:500;margin-bottom:5px;}
.feat-card-body{font-size:11px;line-height:1.55;}

/* Decision fork */
.decision-box{border-radius:12px;padding:14px 18px;text-align:center;margin:16px 0;border:1.5px dashed;}
.fork-row{display:flex;gap:10px;}
.fork-c{flex:1;border-radius:12px;padding:14px 16px;border:0.5px solid;}
.fork-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.fork-sub{font-size:11px;margin-bottom:10px;line-height:1.4;}
.fork-item{font-size:11px;padding:6px 10px;background:var(--color-background-primary);border-radius:7px;border:0.5px solid var(--color-border-tertiary);margin-top:6px;color:var(--color-text-secondary);}

/* Module selector */
.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mod-btn{border:1.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px;cursor:pointer;text-align:left;background:var(--color-background-secondary);transition:all .2s;width:100%;position:relative;}
.mod-btn:hover{transform:translateY(-2px);}
.mod-btn.sel{border-color:var(--mc);background:var(--mb);}
.mod-icon-wrap{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;transition:background .25s;}
.mod-label{font-size:11px;font-weight:500;color:var(--color-text-primary);}
.mod-btn.sel .mod-label{color:var(--mt);}
.mod-count{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;}

/* Detail panel */
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.detail-panel{border-radius:14px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden;animation:panelIn .25s ease forwards;}
.detail-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--color-border-tertiary);}
.detail-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-h-title{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.detail-h-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.feat-list{}
.feat-row{display:flex;align-items:flex-start;gap:12px;padding:10px 18px;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .12s;}
.feat-row:last-child{border-bottom:none;}
.feat-row:hover{background:var(--color-background-secondary);}
.feat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.feat-title{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.feat-desc{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.45;}

/* Pipeline */
.pipe-row{display:flex;gap:0;margin-bottom:16px;overflow:hidden;border-radius:12px;border:0.5px solid var(--color-border-tertiary);}
.pipe-stage{flex:1;padding:12px 10px;text-align:center;border-right:0.5px solid var(--color-border-tertiary);position:relative;transition:background .2s;cursor:pointer;}
.pipe-stage:last-child{border-right:none;}
.pipe-stage:hover{background:var(--color-background-tertiary);}
.pipe-stage.active{background:var(--pb);border-right-color:var(--pc);}
.pipe-stage-arrow{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:8px solid;z-index:2;}
.pipe-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.pipe-count{font-size:18px;font-weight:500;margin-top:4px;}
.pipe-sub{font-size:9px;margin-top:2px;}

/* VMS badges */
.vms-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.vms-badge{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid;}

/* Next / foot */
.next-card{display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:13px 18px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .2s;margin-top:14px;}
.next-card:hover{transform:translateX(4px);}
.next-text{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.next-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary);}
.foot-btn{padding:8px 20px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .2s;}
.foot-btn:disabled{opacity:.3;cursor:default;}
.foot-dots{display:flex;gap:6px;align-items:center;}
.foot-dot{height:8px;border-radius:4px;background:var(--color-border-secondary);transition:all .35s;}
.funnel{display:flex;flex-direction:column;align-items:center;margin:6px 0;}
.funnel-line{width:2px;height:24px;background:var(--color-border-secondary);}
.funnel-head{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;}
</style>

<div class="rj" id="rj">
  <div class="prog" id="prog"></div>
  <div id="content"></div>
</div>

function svgIcon(svg,color,size){
  size=size||20;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" style="color:'+color+'">'+svg+'</svg>';
}

function dline(color){
  return '<svg width="2" height="100%" style="flex:1;min-height:18px;overflow:visible;display:block">'
    +'<line x1="1" y1="0" x2="1" y2="100%" stroke="'+color+'" stroke-width="1.5" stroke-dasharray="4 3"/>'
  +'</svg>';
}

function stepRow(num,label,body,bc,bb,bt,isLast,chips){
  chips=chips||'';
  return '<div class="step-row">'
    +'<div class="step-left">'
      +'<div class="step-ball" style="background:'+bb+';color:'+bt+';border-color:'+bc+'">'+num+'</div>'
      +(!isLast?dline(bc):'')
    +'</div>'
    +'<div class="step-content"><div class="step-card" style="border-color:'+bc+'30;">'
      +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:5px">'
        +'<span class="step-card-title">'+label+'</span>'+chips
      +'</div>'
      +'<div class="step-card-body">'+body+'</div>'
    +'</div></div>'
  +'</div>';
}

function funnel(color){
  return '<div class="funnel"><div class="funnel-line"></div><div class="funnel-head" style="border-top:8px solid '+color+'"></div></div>';
}

function nextCard(label,sub,n){
  return '<div class="next-card" onclick="go('+n+')">'
    +'<div><div class="next-text">'+label+'</div><div class="next-sub">'+sub+'</div></div>'
    +'<div style="font-size:20px;color:var(--color-text-tertiary)">→</div>'
  +'</div>';
}

function foot(){
  var dots=PH.map(function(_,i){
    return '<div class="foot-dot" style="width:'+(i===cur?22:8)+'px;background:'+(i===cur?PH[cur].color:'var(--color-border-secondary)')+'"></div>';
  }).join('');
  return '<div class="foot">'
    +'<button class="foot-btn" '+(cur===0?'disabled':'')+' onclick="go('+(cur-1)+')">← Back</button>'
    +'<div class="foot-dots">'+dots+'</div>'
    +'<button class="foot-btn" '+(cur===PH.length-1?'disabled':'')+' onclick="go('+(cur+1)+')">Next →</button>'
  +'</div>';
}

/* ── Phase 1: Invite & Access ── */
function ph0(){

/* ── Phase 2: Community ── */
function ph1(){
  var p=PH[1];
  var steps=[
    {n:1,l:'See assigned communities',b:'On first login, the recruiter sees all communities they manage. Community names, member counts, and activity indicators are visible at a glance.',isLast:false,chips:''},
    {n:2,l:'Watch the community grow',b:'As candidates complete onboarding and join the queue, the recruiter sees the member count rise in real time. New joiners appear in the verification queue.',isLast:false,chips:''},
    {n:3,l:'Verify incoming talent',b:'The recruiter reviews each new profile — skills, CV, and work history. They accept (talent joins the community) or decline (talent is notified).',isLast:false,chips:''},
    {n:4,l:'Tag & sub-segment members',b:'Once accepted, the recruiter can assign custom tags to each talent — by skill cluster, seniority, specialism, or availability — for faster sourcing later.',isLast:false,chips:''},
    {n:5,l:'Invite talent directly',b:'Recruiters can bypass the public flow and send personalised invitations to specific candidates they already know — directly into the community.',isLast:false,chips:''},
    {n:6,l:'Configure onboarding rules',b:'Set which fields are required, which documents must be uploaded, what consents are captured, and define the modular steps of the join flow — all without engineering.',isLast:true,chips:''}
  ];
  var bc=p.color,bb=p.bg,bt=p.text;
  var rows=steps.map(function(s,i){
    return stepRow(s.n,s.l,s.b,bc,bb,bt,s.isLast,s.chips);
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 2 of 6</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">The recruiter is the gatekeeper and architect of their community — they control who joins, how they are tagged, and what onboarding looks like.</div>'
    +'<div class="stepper">'+rows+'</div>'
    +nextCard('Continue to jobs & matching','Post roles and let AI find the right candidates — Phase 3',2);
}

/* ── Phase 3: Jobs & matching ── */
function ph2(){
  var p=PH[2];
  var jobTypes=[
    {n:'01',label:'Create job manually',src:'Direct entry',desc:'Recruiter builds a new role directly in the platform — title, description, skills required, rate, and contract terms.',accent:'#7F77DD'},
    {n:'02',label:'VMS integration',src:'Fieldglass · Beeline · Coupa',desc:'Jobs flow in automatically from connected VMS systems. Community-specific roles are identified, matched, and published instantly.',accent:'#185FA5'},
    {n:'03',label:'External job board push',src:'Job aggregators',desc:'Recruiter pushes live roles to external job boards via integrations — attracting candidates from outside the community and widening the pool.',accent:'#1D9E75'}
  ];
  var cards=jobTypes.map(function(e){
    return '<div class="feat-card" style="background:'+e.accent+'0d;border-color:'+e.accent+'35;">'
      +'<div class="feat-card-bar" style="background:'+e.accent+'"></div>'
      +'<div class="feat-card-num" style="color:'+e.accent+'">'+e.n+'</div>'
      +'<div class="feat-card-title" style="color:'+e.accent+';padding-left:8px">'+e.label+'</div>'
      +'<div style="font-size:10px;color:'+e.accent+'99;padding-left:8px;margin-bottom:6px">'+e.src+'</div>'
      +'<div class="feat-card-body" style="color:var(--color-text-secondary);padding-left:8px">'+e.desc+'</div>'
    +'</div>';
  }).join('');

  var vmsLabels=['SAP Fieldglass','Beeline','Coupa','PRO Unlimited','Custom VMS'];
  var vmsBadges=vmsLabels.map(function(v){
    return '<div class="vms-badge" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C">'+v+'</div>';
  }).join('');

  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 3 of 6</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">Jobs enter the platform through three channels. The moment a job is live, AI instantly matches it against the community talent pool.</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">'+cards+'</div>'
    +funnel(p.color)
    +'<div class="step-card" style="border-color:'+p.color+'30;background:'+p.bg+'20;margin-bottom:12px;">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        +'<div style="width:32px;height:32px;border-radius:8px;background:'+p.bg+';display:flex;align-items:center;justify-content:center;">'+svgIcon('<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>',p.color,16)+'</div>'
        +'<span style="font-size:13px;font-weight:500;color:'+p.text+'">AI instant candidate matching</span>'
        +'<span class="chip ai-chip">AI-powered</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--color-text-secondary);line-height:1.55">The moment a job is published, the platform automatically ranks the most relevant community members against the role — skills, availability, seniority, and tags all factored in. The recruiter opens the job and sees a pre-ranked candidate list waiting for them.</div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;font-weight:500">Connected VMS systems</div>'
    +'<div class="vms-row">'+vmsBadges+'</div>'
    +nextCard('Continue to candidate engagement','Review profiles, message, and shortlist — Phase 4',3);
}

/* ── Phase 4: Engagement ── */
function ph3(){
  var p=PH[3];
  var steps=[
    {n:1,l:'Review AI-matched candidates',b:'Recruiter opens the job and sees a pre-ranked list of community members. Match score, availability, tenure, and tags are visible without opening the full profile.',isLast:false,chips:'<span class="chip ai-chip">AI-ranked</span>'},
    {n:2,l:'View complete candidate profile',b:'Full profile: work history, skills, education, uploaded CV, community tenure, prior application history, and all assigned tags — one screen.',isLast:false,chips:''},
    {n:3,l:'Download CV',b:'Access and download the candidate\'s most recent CV directly from their profile at any point in the process.',isLast:false,chips:''},
    {n:4,l:'Message via internal platform',b:'Start a conversation in the platform\'s built-in messaging system. The candidate receives an in-platform notification and can reply directly.',isLast:false,chips:''},
    {n:5,l:'Trigger external outreach',b:'Initiate contact outside the platform — send an email or flag for a phone call — all triggered from the platform and logged against the candidate\'s record.',isLast:false,chips:''},
    {n:6,l:'Send bulk outreach',b:'Contact multiple candidates simultaneously using personalised templates with dynamic tokens (name, role, community). Opted-out contacts automatically excluded.',isLast:true,chips:''}
  ];
  var rows=steps.map(function(s){
    return stepRow(s.n,s.l,s.b,p.color,p.bg,p.text,s.isLast,s.chips);
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 4 of 6</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">From AI-matched candidate list to first conversation — every interaction is logged so nothing falls through the cracks.</div>'
    +'<div class="stepper">'+rows+'</div>'
    +nextCard('Continue to pipeline & VMS','Move candidates through stages and propose to client — Phase 5',4);
}

/* ── Phase 5: Pipeline & VMS ── */
function ph4(){
  var p=PH[4];
  var stages=[
    {label:'Longlist',color:'#888780',bg:'#F1EFE8',count:'∞',sub:'Initial pool'},
    {label:'Shortlist',color:'#185FA5',bg:'#E6F1FB',count:'→',sub:'Profile reviewed'},
    {label:'Proposed',color:'#BA7517',bg:'#FAEEDA',count:'→',sub:'Sent to client'},
    {label:'Submitted',color:'#7F77DD',bg:'#EEEDFE',count:'→',sub:'VMS write-back'},
    {label:'Placed',color:'#1D9E75',bg:'#E1F5EE',count:'✓',sub:'Offer accepted'}
  ];
  var pipeHtml=stages.map(function(s,i){
    var isLast=i===stages.length-1;
    return '<div class="pipe-stage '+(i===pipeActive?'active':'')+'" style="--pb:'+s.bg+';--pc:'+s.color+';" onclick="setPipe('+i+')">'
      +(i===pipeActive&&!isLast?'<div class="pipe-stage-arrow" style="border-left-color:'+s.bg+'"></div>':'')
      +'<div class="pipe-label" style="color:'+s.color+'">'+s.label+'</div>'
      +'<div class="pipe-count" style="color:'+s.color+'">'+s.count+'</div>'
      +'<div class="pipe-sub" style="color:'+s.color+'99">'+s.sub+'</div>'
    +'</div>';
  }).join('');

  var stageDescs=[
    'The recruiter adds AI-matched candidates to the longlist for a specific role. This is the initial pool — no commitment yet, just potential.',
    'After reviewing profiles and having initial conversations, the recruiter promotes the strongest candidates to the shortlist — these are the ones they believe are genuinely suitable.',
    'The recruiter formally proposes the shortlisted candidates to the client or hiring manager. Notes, community context, and the CV are bundled with each proposal.',
    'The candidate is submitted to the connected VMS (Fieldglass, Beeline, etc.) via the platform. A write-back event is triggered — the VMS receives the candidate\'s details automatically.',
    'The candidate accepts the offer. VMS status flows back to the platform in real time. The candidate\'s status on the platform updates automatically — recruiter is notified.'
  ];

  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 5 of 6</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">A clear, structured pipeline moves candidates from discovery to placement. Every stage is synced bi-directionally with the connected VMS — no manual status chasing.</div>'
    +'<div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);margin-bottom:8px">Click a stage to explore what happens</div>'
    +'<div class="pipe-row" id="pipe-row">'+pipeHtml+'</div>'
    +'<div class="step-card" style="border-color:'+stages[pipeActive].color+'30;background:'+stages[pipeActive].bg+'20;margin-bottom:16px;" id="pipe-desc">'
      +'<div style="font-size:13px;font-weight:500;color:'+stages[pipeActive].color+';margin-bottom:5px">'+stages[pipeActive].label+'</div>'
      +'<div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">'+stageDescs[pipeActive]+'</div>'
    +'</div>'
    +'<div class="step-card" style="border-color:#85B7EB;background:#E6F1FB20;">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        +'<span style="font-size:13px;font-weight:500;color:#0C447C">Bi-directional VMS sync</span>'
        +'<span class="chip int-chip">Integration</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--color-text-secondary);line-height:1.55">Status changes in the VMS (interview scheduled, offer made, declined, placed) are captured in real time and reflected back on the platform automatically. Recruiters never need to manually update statuses — the platform stays in sync.</div>'
      +'<div class="vms-row" style="margin-top:10px">'
        +'<div class="vms-badge" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C">SAP Fieldglass</div>'
        +'<div class="vms-badge" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C">Beeline</div>'
        +'<div class="vms-badge" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C">Coupa</div>'
        +'<div class="vms-badge" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C">PRO Unlimited</div>'
      +'</div>'
    +'</div>'
    +nextCard('Continue to dashboard & settings','All insights in one view — Phase 6',5);
}

/* ── Phase 6: Dashboard & settings ── */
function ph5(){
  var p=PH[5];
  var mod=null;
  for(var i=0;i<MODS.length;i++){if(MODS[i].id===selMod){mod=MODS[i];break;}}

  var grid=MODS.map(function(m){
    var sel=m.id===selMod;
    return '<button class="mod-btn '+(sel?'sel':'')+'" style="--mc:'+m.color+';--mb:'+m.bg+';--mt:'+m.text+';" onclick="sM(\''+m.id+'\')">'
      +'<div class="mod-icon-wrap" style="background:'+(sel?m.color+'22':'var(--color-background-primary)')+'">'+svgIcon(m.icon,sel?m.color:'var(--color-text-tertiary)',18)+'</div>'
      +'<div class="mod-label">'+m.label+'</div>'
      +'<div class="mod-count">'+m.items.length+' features</div>'
    +'</button>';
  }).join('');

  var feats=mod.items.map(function(f){
    return '<div class="feat-row">'
      +'<div class="feat-dot" style="background:'+mod.color+'"></div>'
      +'<div><div class="feat-title">'+f.l+'</div><div class="feat-desc">'+f.d+'</div></div>'
    +'</div>';
  }).join('');

  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 6 of 6</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">A centralised command centre for every metric that matters — and the platform tools that support day-to-day recruiter operations. Select a module to explore.</div>'
    +'<div class="mod-grid">'+grid+'</div>'
    +'<div class="detail-panel" id="detail-panel">'
      +'<div class="detail-header" style="background:'+mod.bg+'20;">'
        +'<div class="detail-icon" style="background:'+mod.bg+'">'+svgIcon(mod.icon,mod.color,20)+'</div>'
        +'<div><div class="detail-h-title">'+mod.label+'</div><div class="detail-h-sub">'+mod.desc+'</div></div>'
      +'</div>'
      +'<div class="feat-list">'+feats+'</div>'
    +'</div>';
}

var RENDERS=[ph0,ph1,ph2,ph3,ph4,ph5];

function renderProg(){
  var h='';
  PH.forEach(function(p,i){
    var done=i<cur,active=i===cur;
    var dc=done?p.color:(active?p.color:'');
    var ds='border-color:'+(dc||'var(--color-border-tertiary)')+';'+(done?'background:'+p.color+';':'')+(active?'background:'+p.bg+';color:'+p.text+';border-color:'+p.color+';':'');
    h+='<div class="prog-step" onclick="go('+i+')">'
      +'<div class="prog-dot-wrap">'
        +'<div class="prog-dot '+(done?'done':'')+(active?' active':'')+'" style="'+ds+'">'+(done?'✓':(i+1))+'</div>'
        +'<div class="prog-dot-label" style="color:'+(active?p.color:'var(--color-text-tertiary)')+'">'+p.label+'</div>'
      +'</div></div>';
    if(i<PH.length-1) h+='<div class="prog-connector '+(i<cur?'done':'')+'" style="--ph-c:'+PH[i].color+'"></div>';
  });
  document.getElementById('prog').innerHTML=h;
}

function render(){
  renderProg();
  document.getElementById('content').innerHTML='<div class="phase-body">'+RENDERS[cur]()+foot()+'</div>';
}

function go(i){if(i<0||i>=PH.length)return;cur=i;render();}
function sM(id){selMod=id;render();}
function setPipe(i){
  pipeActive=i;
  var stages=[
    {label:'Longlist',color:'#888780',bg:'#F1EFE8'},
    {label:'Shortlist',color:'#185FA5',bg:'#E6F1FB'},
    {label:'Proposed',color:'#BA7517',bg:'#FAEEDA'},
    {label:'Submitted',color:'#7F77DD',bg:'#EEEDFE'},
    {label:'Placed',color:'#1D9E75',bg:'#E1F5EE'}
  ];
  var descs=[
    'The recruiter adds AI-matched candidates to the longlist for a specific role. This is the initial pool — no commitment yet, just potential.',
    'After reviewing profiles and having initial conversations, the recruiter promotes the strongest candidates to the shortlist — these are the ones they believe are genuinely suitable.',
    'The recruiter formally proposes the shortlisted candidates to the client or hiring manager. Notes, community context, and the CV are bundled with each proposal.',
    'The candidate is submitted to the connected VMS (Fieldglass, Beeline, etc.) via the platform. A write-back event is triggered — the VMS receives the candidate\'s details automatically.',
    'The candidate accepts the offer. VMS status flows back to the platform in real time. The candidate\'s status on the platform updates automatically — recruiter is notified.'
  ];
  var pr=document.getElementById('pipe-row');
  if(pr){
    var ps=pr.querySelectorAll('.pipe-stage');
    ps.forEach(function(el,idx){
      el.classList.toggle('active',idx===i);
      el.style.setProperty('--pb',stages[idx].bg);
      el.style.setProperty('--pc',stages[idx].color);
      var arr=el.querySelector('.pipe-stage-arrow');
      if(arr){el.removeChild(arr);}
      if(idx===i&&idx<stages.length-1){
        var d=document.createElement('div');
        d.className='pipe-stage-arrow';
        d.style.borderLeftColor=stages[idx].bg;
        el.appendChild(d);
      }
    });
  }
  var pd=document.getElementById('pipe-desc');
  if(pd){
    pd.style.borderColor=stages[i].color+'30';
    pd.style.background=stages[i].bg+'20';
    pd.innerHTML='<div style="font-size:13px;font-weight:500;color:'+stages[i].color+';margin-bottom:5px">'+stages[i].label+'</div>'
      +'<div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">'+descs[i]+'</div>';
  }
}

render();
</script>
</body></html>
