<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-tertiary: #f1f5f9;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-border-tertiary: rgba(0,0,0,0.07);
  --color-border-secondary: rgba(0,0,0,0.15);
  --color-border-primary: rgba(0,0,0,0.25);
  --color-background-info: #eff6ff;
  --color-text-info: #1d4ed8;
  --color-background-success: #f0fdf4;
  --color-text-success: #166534;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-serif: Georgia, serif;
  --font-mono: Consolas, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
*{box-sizing:border-box;}
body{font-family:var(--font-sans);background:#fff;margin:0;padding:20px;}

*{box-sizing:border-box;margin:0;padding:0;}
.ds{font-family:var(--font-sans);padding:0;}

/* Section nav */
.sec-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;align-items:center;}
.sec-dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-secondary);cursor:pointer;transition:all .3s;flex-shrink:0;}
.sec-dot.on{background:var(--ac);width:28px;border-radius:5px;}
.sec-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-left:6px;}

/* Section header */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.sec-body{animation:fadeUp .4s ease forwards;}
.sec-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;}
.sec-title{font-size:28px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-bottom:10px;}
.sec-title span{font-style:italic;}
.sec-desc{font-size:14px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:24px;max-width:640px;}

/* Problem cards */
.prob-row{display:flex;gap:14px;margin-bottom:24px;}
.prob-card{flex:1;border-radius:16px;padding:22px;border:0.5px solid;position:relative;overflow:hidden;}
.prob-num{font-size:60px;font-weight:500;line-height:1;position:absolute;right:14px;top:8px;opacity:.07;}
.prob-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.prob-title{font-size:16px;font-weight:500;margin-bottom:8px;}
.prob-body{font-size:12px;line-height:1.65;}

/* Flow diagram */
.flow{display:flex;align-items:center;gap:0;margin-bottom:24px;border-radius:14px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);}
.flow-node{flex:1;padding:16px 10px;text-align:center;border-right:0.5px solid var(--color-border-tertiary);}
.flow-node:last-child{border-right:none;}
.flow-node-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.flow-node-label{font-size:12px;font-weight:500;}
.flow-node-sub{font-size:10px;margin-top:3px;}
.flow-arr{color:var(--color-text-tertiary);font-size:22px;flex-shrink:0;padding:0 2px;display:flex;align-items:center;}

/* Before/after toggle */
.ba-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--color-border-secondary);margin-bottom:20px;width:fit-content;}
.ba-btn{padding:8px 22px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);transition:all .2s;}
.ba-btn.on{background:var(--ac);color:#fff;}

/* Stat callouts */
.stat-row{display:flex;gap:12px;margin-bottom:24px;}
.stat-card{flex:1;border-radius:14px;padding:20px 18px;border:0.5px solid;}
.stat-num{font-size:38px;font-weight:500;line-height:1;margin-bottom:6px;}
.stat-label{font-size:12px;font-weight:500;margin-bottom:4px;}
.stat-sub{font-size:11px;opacity:.7;line-height:1.45;}

/* Priority pool */
.pool-wrap{border-radius:16px;overflow:hidden;margin-bottom:20px;border:0.5px solid var(--color-border-tertiary);}
.pool-tier{display:flex;align-items:center;gap:16px;padding:18px 22px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .2s;}
.pool-tier:last-child{border-bottom:none;}
.pool-tier:hover{background:var(--color-background-tertiary);}
.pool-tier-badge{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;flex-shrink:0;}
.pool-tier-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;}
.pool-tier-sub{font-size:11px;color:var(--color-text-secondary);}
.pool-tier-bar{height:6px;border-radius:3px;margin-top:8px;}

/* Value cards */
.val-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.val-card{border-radius:14px;padding:18px;border:0.5px solid;position:relative;overflow:hidden;transition:transform .2s;}
.val-card:hover{transform:translateY(-3px);}
.val-card-top{width:100%;height:4px;border-radius:0;position:absolute;top:0;left:0;}
.val-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.val-title{font-size:13px;font-weight:500;margin-bottom:6px;}
.val-body{font-size:11px;line-height:1.6;}

/* Comparison table */
.cmp{width:100%;border-collapse:collapse;margin-bottom:20px;border-radius:12px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);}
.cmp th{padding:11px 16px;font-size:11px;font-weight:500;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary);}
.cmp td{padding:11px 16px;font-size:11px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle;}
.cmp tr:last-child td{border-bottom:none;}
.cmp tr:nth-child(even) td{background:var(--color-background-secondary);}
.tick{display:inline-flex;width:20px;height:20px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}

/* Journey connector - how it works */
.how-row{display:flex;gap:0;margin-bottom:20px;}
.how-step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 6px;position:relative;}
.how-step:not(:last-child)::after{content:'';position:absolute;right:0;top:22px;width:1px;height:44px;background:var(--color-border-tertiary);}
.how-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;margin-bottom:10px;border:2px solid;}
.how-label{font-size:11px;font-weight:500;margin-bottom:4px;}
.how-sub{font-size:10px;color:var(--color-text-tertiary);line-height:1.4;}

/* Foot */
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:18px;border-top:0.5px solid var(--color-border-tertiary);}
.foot-btn{padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);}
.foot-btn:disabled{opacity:.3;cursor:default;}
.foot-cta{padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;color:#fff;transition:opacity .2s;}
.foot-cta:hover{opacity:.88;}

/* Animate numbers */
@keyframes countUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.cnt{animation:countUp .6s ease forwards;}

/* Chain visual */
.chain{display:flex;align-items:center;justify-content:center;gap:0;margin:24px 0;}
.chain-node{border-radius:12px;padding:14px 18px;text-align:center;min-width:110px;}
.chain-arrow{font-size:22px;padding:0 8px;color:var(--color-text-tertiary);}
.chain-fee{border-radius:8px;padding:4px 10px;font-size:10px;font-weight:500;margin-top:6px;display:inline-block;}
</style>

<div class="ds" id="ds">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-tertiary);margin-bottom:4px">Direct sourcing — the proposition</div>
      <div style="font-size:11px;color:var(--color-text-secondary)" id="sec-counter">Section 1 of 6</div>
    </div>
    <div class="sec-nav" id="sec-nav" style="margin-bottom:0"></div>
  </div>
  <div id="content"></div>
</div>

<script>
var cur=0, baMode='before', poolOpen=-1;

var SECS=[
  {label:'The problem',  color:'#E24B4A', bg:'#FCEBEB', text:'#501313', ac:'#E24B4A'},
  {label:'Old way',      color:'#BA7517', bg:'#FAEEDA', text:'#633806', ac:'#BA7517'},
  {label:'The solution', color:'#1D9E75', bg:'#E1F5EE', text:'#085041', ac:'#1D9E75'},
  {label:'Priority pool',color:'#534AB7', bg:'#EEEDFE', text:'#26215C', ac:'#534AB7'},
  {label:'For companies',color:'#185FA5', bg:'#E6F1FB', text:'#0C447C', ac:'#185FA5'},
  {label:'For talent',   color:'#D85A30', bg:'#FAECE7', text:'#4A1B0C', ac:'#D85A30'},
];

function svgI(path,color,size){
  return '<svg width="'+(size||20)+'" height="'+(size||20)+'" viewBox="0 0 24 24" fill="none" style="color:'+color+'">'+path+'</svg>';
}
function tick(on){
  return '<span class="tick" style="background:'+(on?'#E1F5EE':'#FCEBEB')+';color:'+(on?'#1D9E75':'#E24B4A')+'">'+(on?'✓':'✕')+'</span>';
}

/* Section 0 — The Problem */
function s0(){
  var p=SECS[0];
  return '<div class="sec-tag" style="background:'+p.bg+';color:'+p.color+'">The challenge</div>'
    +'<div class="sec-title">The <span>old way</span> of hiring contingent talent was broken</div>'
    +'<div class="sec-desc">For decades, organisations hiring contingent workers relied entirely on external recruitment agencies. It seemed practical — but it created two structural problems that quietly eroded margins and long-term talent relationships.</div>'
    +'<div class="prob-row">'

    +'<div class="prob-card" style="background:'+p.bg+';border-color:'+p.color+'30;">'
      +'<div class="prob-num" style="color:'+p.color+'">01</div>'
      +'<div class="prob-icon-wrap" style="background:'+p.color+'18;">'+svgI('<line x1="12" y1="1" x2="12" y2="23" stroke="currentColor" stroke-width="2"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',p.color,22)+'</div>'
      +'<div class="prob-title" style="color:'+p.text+'">Costly agency fees</div>'
      +'<div class="prob-body" style="color:'+p.text+'99">Every hire came with a 15–25% agency markup on top of the candidate\'s day rate. For high-volume contingent programmes, this became a significant and recurring cost — money leaving the business on every single engagement.</div>'
    +'</div>'

    +'<div class="prob-card" style="background:'+p.bg+';border-color:'+p.color+'30;">'
      +'<div class="prob-num" style="color:'+p.color+'">02</div>'
      +'<div class="prob-icon-wrap" style="background:'+p.color+'18;">'+svgI('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="8" x2="20" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',p.color,22)+'</div>'
      +'<div class="prob-title" style="color:'+p.text+'">Zero talent ownership</div>'
      +'<div class="prob-body" style="color:'+p.text+'99">Agencies owned the candidate relationships. When a supplier partnership ended, the talent went with them. Organisations had no direct access to their own talent market — no database, no engagement history, no community. Starting from zero every cycle.</div>'
    +'</div>'

    +'</div>'

    +'<div style="border-radius:12px;padding:14px 18px;background:var(--color-background-secondary);border-left:3px solid '+p.color+';margin-bottom:4px;">'
      +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px">The compounding effect</div>'
      +'<div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">High fees meant less budget. Less budget meant fewer hires or worse candidates. And with no talent pipeline of their own, organisations were permanently dependent — locked into agency relationships with no exit strategy.</div>'
    +'</div>';
}

/* Section 1 — Old way visual */
function s1(){
  var p=SECS[1];
  var isBefore=baMode==='before';
  var rows=[
    {label:'Candidate relationship owned by',  before:'Agency',      after:'Your organisation',  bOn:false,aOn:true},
    {label:'Agency fee per placement',          before:'15–25% markup',after:'Zero',              bOn:false,aOn:true},
    {label:'Talent pool retained when supplier leaves',before:'No',  after:'Yes — always yours', bOn:false,aOn:true},
    {label:'Speed to engage existing talent',   before:'Start from zero',after:'Community-first', bOn:false,aOn:true},
    {label:'Direct candidate communication',    before:'Via agency only',after:'Direct messaging', bOn:false,aOn:true},
    {label:'Brand visibility to talent',        before:'Agency brand', after:'Your brand',         bOn:false,aOn:true},
  ];
  return '<div class="sec-tag" style="background:'+p.bg+';color:'+p.color+'">Before & after</div>'
    +'<div class="sec-title">See exactly what changes</div>'
    +'<div class="sec-desc">Toggle between the agency-led model and the direct sourcing model to see the structural difference across every dimension that matters.</div>'
    +'<div class="ba-toggle" style="--ac:'+p.color+';">'
      +'<button class="ba-btn '+(isBefore?'on':'')+'" onclick="setBA(\'before\')">Agency model (before)</button>'
      +'<button class="ba-btn '+(!isBefore?'on':'')+'" onclick="setBA(\'after\')">Direct sourcing (after)</button>'
    +'</div>'

    +(isBefore
    ?'<div class="chain">'
      +'<div class="chain-node" style="background:#FCEBEB;border:0.5px solid #F09595;">'
        +'<div style="font-size:11px;font-weight:500;color:#791F1F">Your company</div>'
        +'<div class="chain-fee" style="background:#F09595;color:#501313">Pays fee</div>'
      +'</div>'
      +'<span class="chain-arrow">→</span>'
      +'<div class="chain-node" style="background:#FAEEDA;border:0.5px solid #EF9F27;">'
        +'<div style="font-size:11px;font-weight:500;color:#633806">Agency</div>'
        +'<div class="chain-fee" style="background:#FAC775;color:#412402">15–25% markup</div>'
      +'</div>'
      +'<span class="chain-arrow">→</span>'
      +'<div class="chain-node" style="background:#F1EFE8;border:0.5px solid #B4B2A9;">'
        +'<div style="font-size:11px;font-weight:500;color:#444441">Talent</div>'
        +'<div class="chain-fee" style="background:#D3D1C7;color:#2C2C2A">Agency owned</div>'
      +'</div>'
    +'</div>'
    :'<div class="chain">'
      +'<div class="chain-node" style="background:#E1F5EE;border:0.5px solid #5DCAA5;">'
        +'<div style="font-size:11px;font-weight:500;color:#085041">Your company</div>'
        +'<div class="chain-fee" style="background:#5DCAA5;color:#04342C">Your brand</div>'
      +'</div>'
      +'<span class="chain-arrow" style="color:#1D9E75">→</span>'
      +'<div class="chain-node" style="background:#EEEDFE;border:0.5px solid #7F77DD;">'
        +'<div style="font-size:11px;font-weight:500;color:#3C3489">Talent community</div>'
        +'<div class="chain-fee" style="background:#7F77DD;color:#fff">You own this</div>'
      +'</div>'
      +'<span class="chain-arrow" style="color:#1D9E75">→</span>'
      +'<div class="chain-node" style="background:#E1F5EE;border:0.5px solid #5DCAA5;">'
        +'<div style="font-size:11px;font-weight:500;color:#085041">Talent</div>'
        +'<div class="chain-fee" style="background:#1D9E75;color:#fff">Direct access</div>'
      +'</div>'
    +'</div>')

    +'<table class="cmp">'
    +'<thead><tr><th style="background:var(--color-background-secondary)">Dimension</th>'
    +'<th style="background:'+(isBefore?'#FCEBEB':'var(--color-background-secondary)')+';color:'+(isBefore?'#A32D2D':'var(--color-text-secondary)')+'">Agency model</th>'
    +'<th style="background:'+(!isBefore?'#E1F5EE':'var(--color-background-secondary)')+';color:'+(!isBefore?'#085041':'var(--color-text-secondary)')+'">Direct sourcing</th>'
    +'</tr></thead><tbody>'
    +rows.map(function(r){
      return '<tr><td style="font-weight:500">'+r.label+'</td>'
        +'<td style="color:'+(isBefore?'#A32D2D':'var(--color-text-tertiary)');+'">'+tick(r.bOn)+' <span style="margin-left:5px">'+r.before+'</span></td>'
        +'<td style="color:'+(!isBefore?'#085041':'var(--color-text-tertiary)')+'">'+tick(r.aOn)+' <span style="margin-left:5px">'+r.after+'</span></td>'
      +'</tr>';
    }).join('')
    +'</tbody></table>';
}

/* Section 2 — The Solution */
function s2(){
  var p=SECS[2];
  var steps=[
    {n:1,l:'Build a branded talent community',s:'Under your company\'s name, values, and visual identity — not an agency\'s. Candidates join because they want to work for you.',c:p.color},
    {n:2,l:'Attract talent beyond current roles',s:'Invite and engage professionals before you have a live vacancy. Build a warm, vetted pool that is ready when you need it.',c:p.color},
    {n:3,l:'Vet and qualify candidates proactively',s:'Recruiter reviews and accepts each member. Every person in the community is pre-screened — not a cold database.',c:p.color},
    {n:4,l:'Community becomes the priority pool',s:'When a role opens, the community is searched first. If a match is found, you fill from within — no agency needed.',c:p.color},
    {n:5,l:'Open to external market only if needed',s:'If no community match exists, the role is opened externally. Community-first always; external is the fallback, not the default.',c:'#888780'},
  ];
  var rows=steps.map(function(s,i){
    var isLast=i===steps.length-1;
    return '<div style="display:flex;gap:16px;'+(isLast?'opacity:.65':'')+'">'
      +'<div style="display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;">'
        +'<div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;background:'+(isLast?'#F1EFE8':p.bg)+';color:'+(isLast?'#888780':p.text)+';border:2px solid '+(isLast?'#888780':p.color)+'">'+s.n+'</div>'
        +(!isLast?'<div style="width:2px;flex:1;min-height:14px;background:'+p.color+'30;margin:3px 0;border-radius:1px;"></div>':'')
      +'</div>'
      +'<div style="flex:1;padding-bottom:16px;">'
        +'<div style="border-radius:12px;padding:13px 16px;border:0.5px solid '+(isLast?'#88878040':p.color+'25')+';background:var(--color-background-primary);">'
          +'<div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px">'+s.l+(isLast?' <span style="font-size:10px;color:#888780;font-weight:400">(fallback only)</span>':'')+'</div>'
          +'<div style="font-size:11px;color:var(--color-text-secondary);line-height:1.55">'+s.s+'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  return '<div class="sec-tag" style="background:'+p.bg+';color:'+p.color+'">The solution</div>'
    +'<div class="sec-title">Direct sourcing: <span>own your talent pipeline</span></div>'
    +'<div class="sec-desc">Direct sourcing replaces agency dependency with a company-owned, branded talent community — built on your values, maintained by your team, and ready to fill roles before the external market ever sees them.</div>'
    +'<div>'+rows+'</div>';
}

/* Section 3 — Priority Pool */
function s3(){
  var p=SECS[3];
  var tiers=[
    {label:'Tier Zero',badge:'Priority pool',title:'Your branded talent community',sub:'Vetted, engaged members who joined because they want to work for you. Always the first port of call when a role opens.',color:'#534AB7',bg:'#EEEDFE',fill:100,pill:'First priority'},
    {label:'External market',badge:'Fallback only',title:'Open job boards & agencies',sub:'The wider market — only activated if no suitable candidate is found in the community. Used less and less as the community grows.',color:'#888780',bg:'#F1EFE8',fill:35,pill:'Fallback'},
  ];
  return '<div class="sec-tag" style="background:'+p.bg+';color:'+p.color+'">The priority pool</div>'
    +'<div class="sec-title">Community first. <span>External is the fallback.</span></div>'
    +'<div class="sec-desc">The direct sourcing model establishes a clear priority hierarchy. Your branded community is Tier Zero — the first and best source of talent for every role. Only when Tier Zero has no match does the search go external.</div>'

    +'<div class="pool-wrap">'
    +tiers.map(function(t,i){
      return '<div class="pool-tier" style="background:'+(i===0?t.bg+'60':'')+';">'
        +'<div style="width:36px;height:36px;border-radius:9px;background:'+t.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
          +'<div style="width:10px;height:10px;border-radius:50%;background:'+t.color+'"></div>'
        +'</div>'
        +'<div style="flex:1;">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">'
            +'<span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">'+t.title+'</span>'
            +'<span style="padding:2px 10px;border-radius:20px;font-size:10px;font-weight:500;background:'+t.bg+';color:'+t.color+'">'+t.pill+'</span>'
          +'</div>'
          +'<div style="font-size:11px;color:var(--color-text-secondary);">'+t.sub+'</div>'
          +'<div style="height:5px;border-radius:3px;background:var(--color-background-tertiary);margin-top:10px;">'
            +'<div style="height:5px;border-radius:3px;background:'+t.color+';width:'+t.fill+'%;transition:width .5s;"></div>'
          +'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0;">'

var RENDERS=[s0,s1,s2,s3,s4,s5];

function renderNav(){
  var h='';
  SECS.forEach(function(s,i){
    h+='<div class="sec-dot '+(i===cur?'on':'')+'" style="--ac:'+s.color+';" onclick="go('+i+')" title="'+s.label+'"></div>';
  });
  document.getElementById('sec-nav').innerHTML=h;
  document.getElementById('sec-counter').textContent='Section '+(cur+1)+' of '+SECS.length+' — '+SECS[cur].label;
}

function render(){
  renderNav();
  var p=SECS[cur];
  var foot='<div class="foot">'
    +'<button class="foot-btn" '+(cur===0?'disabled':'')+' onclick="go('+(cur-1)+')">← Previous</button>'
    +(cur<SECS.length-1
      ?'<button class="foot-cta" style="background:'+p.color+';" onclick="go('+(cur+1)+')">Next: '+SECS[cur+1].label+' →</button>'
      :'<div style="font-size:12px;color:var(--color-text-tertiary)">End of proposition</div>'
    )
  +'</div>';
  document.getElementById('content').innerHTML='<div class="sec-body">'+RENDERS[cur]()+foot+'</div>';
}

function go(i){if(i<0||i>=SECS.length)return;cur=i;render();}
function setBA(mode){baMode=mode;render();}
render();
</script>
