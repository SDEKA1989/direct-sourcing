<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-tertiary: #f1f5f9;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-border-tertiary: rgba(0,0,0,0.07);
  --color-border-secondary: rgba(0,0,0,0.15);
  --color-border-primary: rgba(0,0,0,0.25);
  --color-background-info: #eff6ff;
  --color-text-info: #1d4ed8;
  --color-background-success: #f0fdf4;
  --color-text-success: #166534;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-serif: Georgia, serif;
  --font-mono: Consolas, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
*{box-sizing:border-box;}
body{font-family:var(--font-sans);background:#fff;margin:0;padding:20px;}

*{box-sizing:border-box;margin:0;padding:0;}
.aj{font-family:var(--font-sans);padding:1.5rem 0;}
.prog{display:flex;align-items:center;margin-bottom:32px;overflow-x:auto;padding-bottom:4px;}
.prog-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;}
.prog-connector{flex:1;min-width:14px;height:2px;background:var(--color-border-tertiary);transition:background .4s;margin-top:-22px;z-index:0;}
.prog-connector.done{background:var(--ph-c,#534AB7);}
.prog-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1;}
.prog-dot{width:42px;height:42px;border-radius:50%;border:2px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--color-text-tertiary);background:var(--color-background-primary);transition:all .35s;}
.prog-dot.active{transform:scale(1.12);}
.prog-dot.done{color:#fff;border-width:0;}
.prog-dot-label{font-size:9px;font-weight:500;color:var(--color-text-tertiary);text-align:center;white-space:nowrap;max-width:68px;line-height:1.3;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.3;}100%{transform:scale(1.75);opacity:0;}}
@keyframes chipGlow{0%,100%{border-color:#AFA9EC;}50%{border-color:#7F77DD;}}
.phase-body{animation:fadeUp .35s ease forwards;}
.ph-eyebrow{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.ph-title{font-size:24px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;}
.ph-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:22px;}
.invite-box{border-radius:14px;padding:20px 24px;text-align:center;border:2px solid;position:relative;overflow:hidden;margin-bottom:12px;}
.invite-pulse{position:absolute;inset:0;border-radius:14px;border:2px solid;animation:pulseRing 2.2s ease-out infinite;}
.invite-title{font-size:19px;font-weight:500;margin-bottom:4px;position:relative;}
.invite-sub{font-size:12px;position:relative;}
.stepper{display:flex;flex-direction:column;margin-bottom:16px;}
.step-row{display:flex;gap:16px;}
.step-left{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;}
.step-ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;border:2px solid;flex-shrink:0;}
.step-content{flex:1;padding-bottom:16px;}
.step-card{border-radius:12px;padding:13px 15px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);}
.step-card-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;}
.step-card-body{font-size:11px;color:var(--color-text-secondary);line-height:1.55;}
.chip{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;display:inline-block;margin-left:5px;}
.chip-admin{background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC;}
.chip-int{background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB;}
.chip-new{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.feat-card{border-radius:12px;padding:14px;border:0.5px solid;position:relative;overflow:hidden;transition:transform .2s;}
.feat-card:hover{transform:translateY(-2px);}
.feat-card-bar{position:absolute;top:0;left:0;width:4px;height:100%;}
.feat-card-ghost{position:absolute;right:8px;top:4px;font-size:46px;font-weight:500;line-height:1;opacity:.07;}
.feat-card-title{font-size:12px;font-weight:500;margin-bottom:5px;padding-left:8px;}
.feat-card-body{font-size:11px;line-height:1.55;padding-left:8px;}
.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mod-btn{border:1.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px;cursor:pointer;text-align:left;background:var(--color-background-secondary);transition:all .2s;width:100%;position:relative;}
.mod-btn:hover{transform:translateY(-2px);}
.mod-btn.sel{border-color:var(--mc);background:var(--mb);}
.mod-icon-wrap{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.mod-label{font-size:11px;font-weight:500;color:var(--color-text-primary);}
.mod-btn.sel .mod-label{color:var(--mt);}
.mod-count{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;}
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.detail-panel{border-radius:14px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden;animation:panelIn .25s ease forwards;}
.detail-header{padding:13px 18px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--color-border-tertiary);}
.detail-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-h-title{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.detail-h-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.feat-row{display:flex;align-items:flex-start;gap:12px;padding:10px 18px;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .12s;}
.feat-row:last-child{border-bottom:none;}
.feat-row:hover{background:var(--color-background-secondary);}
.feat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.feat-title{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.feat-desc{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.45;}
.next-card{display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:13px 18px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .2s;margin-top:14px;}
.next-card:hover{transform:translateX(4px);}
.next-text{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.next-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary);}
.foot-btn{padding:8px 20px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);}
.foot-btn:disabled{opacity:.3;cursor:default;}
.foot-dots{display:flex;gap:6px;align-items:center;}
.foot-dot{height:8px;border-radius:4px;background:var(--color-border-secondary);transition:all .35s;}
.funnel{display:flex;flex-direction:column;align-items:center;margin:8px 0;}
.funnel-line{width:2px;height:24px;background:var(--color-border-secondary);}
.funnel-head{border-left:6px solid transparent;border-right:6px solid transparent;}
.recruiter-ref{border-radius:12px;padding:14px 18px;border:1.5px dashed var(--color-border-secondary);background:var(--color-background-secondary);margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.role-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.role-pill{padding:7px 16px;border-radius:30px;font-size:12px;font-weight:500;border:1.5px solid;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s;}
.role-pill:hover{transform:scale(1.03);}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:9px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:11px;}
.perm-label{color:var(--color-text-primary);font-weight:500;}
.perm-toggle{width:36px;height:20px;border-radius:10px;position:relative;flex-shrink:0;transition:background .2s;}
.perm-toggle-dot{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;}
</style>

<div class="aj" id="aj">
  <div class="prog" id="prog"></div>
  <div id="content"></div>
</div>

<script>
var cur=0, selMod='company', selRole='admin', activePerms={};

var PH=[
  {label:'Access',         sub:'Admin joins the platform',             color:'#534AB7',bg:'#EEEDFE',text:'#26215C'},
  {label:'Recruiter tools',sub:'Everything a recruiter can do',        color:'#1D9E75',bg:'#E1F5EE',text:'#085041'},
  {label:'Company & brand',sub:'Profile, white-label & legal',         color:'#D85A30',bg:'#FAECE7',text:'#4A1B0C'},
  {label:'Job boards',     sub:'Broadbean & external publishing',      color:'#185FA5',bg:'#E6F1FB',text:'#0C447C'},
  {label:'Reports',        sub:'Download & analyse platform data',     color:'#BA7517',bg:'#FAEEDA',text:'#633806'},
  {label:'Dashboard & KPIs',sub:'Recruiter performance & insights',   color:'#A32D2D',bg:'#FCEBEB',text:'#501313'},
  {label:'Roles & access', sub:'Custom roles and permissions',         color:'#3B6D11',bg:'#EAF3DE',text:'#173404'}
];

var MODS=[
  {id:'company',label:'Company profile',color:'#D85A30',bg:'#FAECE7',text:'#4A1B0C',
   desc:'Set up and manage your organisation profile',
   icon:'<rect x="3" y="9" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 9V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4" stroke="currentColor" stroke-width="2" fill="none"/><line x1="12" y1="13" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>',
   items:[
    {l:'Company name & details',       d:'Set the official company name, registration details, and primary contact information shown across the platform'},
    {l:'Company logo & avatar',        d:'Upload the primary company logo used in platform headers, email footers, and community branding'},
    {l:'Recruiter management',         d:'Invite new recruiters into the platform, view all active recruiter accounts, and deactivate access when needed'},
    {l:'Admin invitations',            d:'Admin accounts can only be created and invited from the back panel — not from within the platform by other admins'}
   ]},
  {id:'branding',label:'Branding',color:'#7F77DD',bg:'#EEEDFE',text:'#3C3489',
   desc:'Full white-label customisation per client brand',
   icon:'<circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
   items:[
    {l:'Primary & secondary colours',  d:'Set brand colours applied to buttons, links, active states, and navigation across the entire platform'},
    {l:'Typography',                   d:'Configure the font family for headings and body text to match client brand guidelines'},
    {l:'Logo & favicon',               d:'Upload client logo for the platform header and browser tab favicon — separate uploads for each'},
    {l:'Navigation labels',            d:'Rename navigation items to match client terminology — e.g. rename "Community" to the client\'s preferred label'},
    {l:'Email template branding',      d:'Apply brand colours and logo to all outbound email templates — candidates receive branded communications'},
    {l:'Custom domain',                d:'Configure a client-specific domain or subdomain for the platform — fully white-labelled URL'}
   ]},
  {id:'legal',label:'Legal & terms',color:'#444441',bg:'#F1EFE8',text:'#2C2C2A',
   desc:'Terms, privacy, and compliance content',
   icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>',
   items:[
    {l:'Terms & conditions',           d:'Upload or write the community terms and conditions that candidates must accept during onboarding'},
    {l:'Privacy statement',            d:'Set the platform privacy notice governing how candidate data is collected, used, and stored'},
    {l:'Cookie policy',                d:'Configure the cookie consent banner and policy shown to users on first visit'},
    {l:'Custom legal fields',          d:'Add any additional legal disclosures, jurisdiction-specific notices, or compliance statements required for the community'},
    {l:'Consent version management',   d:'Each update to legal content is versioned — existing members are prompted to re-consent when terms change'}
   ]}
];

function svgI(svg,color,size){
  return '<svg width="'+(size||18)+'" height="'+(size||18)+'" viewBox="0 0 24 24" fill="none" style="color:'+color+'">'+svg+'</svg>';
}

function dline(c){
  return '<svg width="2" height="100%" style="flex:1;min-height:18px;overflow:visible;display:block">'
    +'<line x1="1" y1="0" x2="1" y2="100%" stroke="'+c+'" stroke-width="1.5" stroke-dasharray="4 3"/></svg>';
}

function stepRow(n,label,body,bc,bb,bt,isLast,chips){
  return '<div class="step-row">'
    +'<div class="step-left"><div class="step-ball" style="background:'+bb+';color:'+bt+';border-color:'+bc+'">'+n+'</div>'
    +(!isLast?dline(bc):'')+'</div>'
    +'<div class="step-content"><div class="step-card" style="border-color:'+bc+'25;">'
      +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px">'
        +'<span class="step-card-title">'+label+'</span>'+(chips||'')
      +'</div>'
      +'<div class="step-card-body">'+body+'</div>'
    +'</div></div></div>';
}

function nextCard(label,sub,n){
  return '<div class="next-card" onclick="go('+n+')">'
    +'<div><div class="next-text">'+label+'</div><div class="next-sub">'+sub+'</div></div>'
    +'<div style="font-size:20px;color:var(--color-text-tertiary)">→</div></div>';
}

function foot(){
  var dots=PH.map(function(_,i){
    return '<div class="foot-dot" style="width:'+(i===cur?22:8)+'px;background:'+(i===cur?PH[cur].color:'var(--color-border-secondary)')+'"></div>';
  }).join('');
  return '<div class="foot">'
    +'<button class="foot-btn" '+(cur===0?'disabled':'')+' onclick="go('+(cur-1)+')">← Back</button>'
    +'<div class="foot-dots">'+dots+'</div>'
    +'<button class="foot-btn" '+(cur===PH.length-1?'disabled':'')+' onclick="go('+(cur+1)+')">Next →</button>'
  +'</div>';
}

/* Phase 0 — Access */
function ph0(){
  var p=PH[0];
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 1 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">Admin accounts sit above recruiter access — they are created and invited exclusively from the back panel. No admin can be created from within the platform itself.</div>'
    +'<div class="stepper">'
      +stepRow(1,'Back panel invitation','A super-admin or platform operator creates the admin account in the back panel and dispatches an invitation email with a secure one-time setup link.',p.color,p.bg,p.text,false,'<span class="chip chip-admin">Back panel only</span>')
      +stepRow(2,'Account setup','Admin clicks the link, sets their password (or connects via SSO), and completes their profile — name, role title, and notification preferences.',p.color,p.bg,p.text,false,'')
      +stepRow(3,'Platform access granted','Admin lands on the full dashboard with elevated access — all recruiter capabilities plus admin-only modules visible immediately.',p.color,p.bg,p.text,true,'<span class="chip chip-new">Elevated access</span>')
    +'</div>'
    +'<div style="border-radius:12px;padding:14px 18px;background:'+p.bg+';border:1.5px dashed '+p.color+';margin-bottom:16px;">'
      +'<div style="font-size:11px;font-weight:500;color:'+p.text+';margin-bottom:6px">Access hierarchy</div>'
      +'<div style="display:flex;align-items:stretch;gap:0;border-radius:8px;overflow:hidden;border:0.5px solid '+p.color+'30;">'
        +'<div style="flex:1;padding:10px 14px;background:'+p.color+';color:white;font-size:11px;font-weight:500;">Admin<div style="font-size:10px;font-weight:400;opacity:.8;margin-top:2px">All recruiter tools + admin-only features</div></div>'
        +'<div style="flex:1;padding:10px 14px;background:'+p.bg+';color:'+p.text+';font-size:11px;font-weight:500;border-left:0.5px solid '+p.color+'30;">Recruiter<div style="font-size:10px;font-weight:400;opacity:.7;margin-top:2px">Community, jobs, pipeline, messaging</div></div>'
        +'<div style="flex:1;padding:10px 14px;background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;font-weight:500;border-left:0.5px solid var(--color-border-tertiary);">Custom roles<div style="font-size:10px;font-weight:400;margin-top:2px">Configured per role by admin</div></div>'
      +'</div>'
    +'</div>'
    +nextCard('Continue to recruiter tools','Everything a recruiter can do — Phase 2',1);
}

/* Phase 1 — Recruiter tools (summary ref) */
function ph1(){
  var p=PH[1];
  var tools=[
    {icon:'<circle cx="12" cy="8" r="3" fill="currentColor"/><path d="M3 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" fill="none"/>',label:'Community management',items:['Verify & accept incoming talent','Remove members from community','Tag & sub-segment candidates','Invite talent directly','Configure onboarding rules']},
    {icon:'<rect x="2" y="7" width="20" height="13" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" fill="none"/>',label:'Jobs & AI matching',items:['Create jobs manually','Receive jobs via VMS integration','AI instant candidate matching','Push jobs to external boards']},
    {icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" fill="none"/>',label:'Candidate engagement',items:['View full profiles & CVs','Internal platform messaging','External outreach trigger','Bulk personalised outreach']},
    {icon:'<line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="18" x2="14" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="19" cy="18" r="3" fill="currentColor"/>',label:'Pipeline & VMS',items:['Longlist → shortlist → propose','VMS submission write-back','Bi-directional status sync','Team pipeline collaboration']}
  ];
  var cards=tools.map(function(t){
    var items=t.items.map(function(i){ return '<div style="font-size:11px;color:var(--color-text-secondary);padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:7px"><span style="color:'+p.color+';font-size:13px">›</span>'+i+'</div>'; }).join('');
    return '<div style="border-radius:12px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden;">'
      +'<div style="padding:11px 14px;background:'+p.bg+';display:flex;align-items:center;gap:9px;border-bottom:0.5px solid '+p.color+'30;">'
        +'<div style="width:28px;height:28px;border-radius:7px;background:'+p.color+'22;display:flex;align-items:center;justify-content:center;">'+svgI(t.icon,p.color,15)+'</div>'
        +'<span style="font-size:12px;font-weight:500;color:'+p.text+'">'+t.label+'</span>'
      +'</div>'
      +'<div style="padding:8px 14px 10px">'+items+'</div>'
    +'</div>';
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 2 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">Admins inherit the full recruiter toolkit. Every capability a recruiter has is also available to the admin — plus the admin-only features in the phases that follow.</div>'
    +'<div class="recruiter-ref">'
      +'<div style="width:40px;height:40px;border-radius:10px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+svgI('<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/>','#1D9E75',18)+'</div>'
      +'<div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">Full recruiter capabilities included</div><div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">All tools from the recruiter journey are available to the admin — refer to the Recruiter Process Map for the detailed walkthrough</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">'+cards+'</div>'
    +nextCard('Continue to company & branding','Set up company profile and white-label brand — Phase 3',2);
}

/* Phase 2 — Company & Brand & Legal */
function ph2(){
  var p=PH[2];
  var mod=null;
  for(var i=0;i<MODS.length;i++){if(MODS[i].id===selMod){mod=MODS[i];break;}}
  var grid=MODS.map(function(m){
    var sel=m.id===selMod;
    return '<button class="mod-btn '+(sel?'sel':'')+'" style="--mc:'+m.color+';--mb:'+m.bg+';--mt:'+m.text+';" onclick="sM(\''+m.id+'\')">'
      +'<div class="mod-icon-wrap" style="background:'+(sel?m.color+'22':'var(--color-background-primary)')+'">'+svgI(m.icon,sel?m.color:'var(--color-text-tertiary)',17)+'</div>'
      +'<div class="mod-label">'+m.label+'</div>'
      +'<div class="mod-count">'+m.items.length+' settings</div>'
    +'</button>';
  }).join('');
  var feats=mod.items.map(function(f){
    return '<div class="feat-row"><div class="feat-dot" style="background:'+mod.color+'"></div>'
      +'<div><div class="feat-title">'+f.l+'</div><div class="feat-desc">'+f.d+'</div></div></div>';
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 3 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">The admin configures the platform\'s identity — company profile, full white-label branding per client guidelines, and all legal content. Select a section below.</div>'
    +'<div class="mod-grid">'+grid+'</div>'
    +'<div class="detail-panel">'
      +'<div class="detail-header" style="background:'+mod.bg+'20;">'
        +'<div class="detail-icon" style="background:'+mod.bg+'">'+svgI(mod.icon,mod.color,19)+'</div>'
        +'<div><div class="detail-h-title">'+mod.label+'</div><div class="detail-h-sub">'+mod.desc+'</div></div>'
      +'</div>'
      +'<div>'+feats+'</div>'
    +'</div>'
    +nextCard('Continue to job board setup','Configure Broadbean and external publishing — Phase 4',3);
}

/* Phase 3 — Job boards / Broadbean */
function ph3(){
  var p=PH[3];
  var steps=[
    {n:1,l:'Connect Broadbean account',b:'Admin enters Broadbean API credentials in the integration settings. The connection is tested and confirmed before any publishing is enabled.',isLast:false,chips:'<span class="chip chip-int">Integration</span>'},
    {n:2,l:'Select target job boards',b:'Admin configures which external job boards Broadbean will publish to — Indeed, Totaljobs, Reed, LinkedIn, and others available via the Broadbean network.',isLast:false,chips:''},
    {n:3,l:'Set publishing rules',b:'Define which roles are eligible for external publishing — community-only roles can be excluded. Rules applied per community or per job type.',isLast:false,chips:''},
    {n:4,l:'Recruiters push jobs',b:'Once configured, recruiters can push any eligible live job to external boards directly from the job management screen — one click, multi-board distribution.',isLast:false,chips:''},
    {n:5,l:'Inbound applications flow back',b:'External applicants who apply via job boards are automatically pulled back into the platform as new candidate leads — linked to the specific role they applied for.',isLast:false,chips:'<span class="chip chip-int">Auto-sync</span>'},
    {n:6,l:'Attribution tracked',b:'Each external application is tagged with its source board — admin and recruiters can see exactly which boards are generating the most qualified inbound leads per role.',isLast:true,chips:''}
  ];
  var rows=steps.map(function(s){
    return stepRow(s.n,s.l,s.b,p.color,p.bg,p.text,s.isLast,s.chips);
  }).join('');
  var boards=['Indeed','LinkedIn','Totaljobs','Reed','CWJobs','CV-Library'];
  var bBadges=boards.map(function(b){
    return '<div style="padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;background:#E6F1FB;border:0.5px solid #85B7EB;color:#0C447C">'+b+'</div>';
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 4 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">The admin sets up the Broadbean integration — enabling recruiters to publish community roles to external job boards and receive applications back directly into the platform.</div>'
    +'<div class="stepper">'+rows+'</div>'
    +'<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:8px">Supported boards via Broadbean</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">'+bBadges+'</div>'
    +nextCard('Continue to reports','Download and analyse platform data — Phase 5',4);
}

/* Phase 4 — Reports */
function ph4(){
  var p=PH[4];
  var reps=[
    {n:'01',label:'Community report',desc:'Member counts, growth over time, verification rates, active vs dormant members, and tag distribution.',accent:p.color},
    {n:'02',label:'Jobs & pipeline report',desc:'Roles created, time-to-fill, pipeline stage conversion rates, VMS submission outcomes, and fill rate by source.',accent:'#185FA5'},
    {n:'03',label:'Candidate engagement report',desc:'Outreach sent vs replied, application rates, withdrawal rates, and messaging activity per recruiter.',accent:'#1D9E75'},
    {n:'04',label:'Recruiter activity report',desc:'Per-recruiter KPIs — jobs managed, candidates contacted, shortlists submitted, and pipeline progression rates.',accent:'#7F77DD'},
    {n:'05',label:'Job board attribution report',desc:'External job board performance — applications received per board, conversion rates, and cost-per-lead by source.',accent:'#BA7517'},
    {n:'06',label:'Compliance & data report',desc:'Consent records, data subject requests, erasure completions, and co-employment risk flags across the community.',accent:'#A32D2D'}
  ];
  var cards=reps.map(function(r){
    return '<div class="feat-card" style="background:'+r.accent+'08;border-color:'+r.accent+'30;">'
      +'<div class="feat-card-bar" style="background:'+r.accent+'"></div>'
      +'<div class="feat-card-ghost" style="color:'+r.accent+'">'+r.n+'</div>'
      +'<div class="feat-card-title" style="color:'+r.accent+'">'+r.label+'</div>'
      +'<div class="feat-card-body" style="color:var(--color-text-secondary)">'+r.desc+'</div>'
    +'</div>';
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 5 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">Admins have access to six report categories — each downloadable as CSV or PDF. Reports can be filtered by date range, recruiter, community, and job type.</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">'+cards+'</div>'
    +'<div style="border-radius:12px;padding:13px 18px;background:'+p.bg+';border:0.5px solid '+p.color+'30;display:flex;align-items:center;gap:14px;margin-bottom:4px;">'
      +'<div style="width:36px;height:36px;border-radius:9px;background:'+p.color+'22;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+svgI('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round"/>',p.color,18)+'</div>'
      +'<div><div style="font-size:12px;font-weight:500;color:'+p.text+'">Export options</div><div style="font-size:11px;color:'+p.text+'99;margin-top:3px">All reports downloadable as CSV or PDF · Filterable by date, recruiter, community, and role type · Scheduled exports configurable via settings</div></div>'
    +'</div>'
    +nextCard('Continue to dashboard & KPIs','Recruiter performance metrics and insights — Phase 6',5);
}

/* Phase 5 — Dashboard & KPIs */
function ph5(){
  var p=PH[5];
  var kpis=[
    {label:'Jobs filled',sub:'Community vs external source',color:'#1D9E75'},
    {label:'Time to fill',sub:'Average days per role',color:'#185FA5'},
    {label:'Shortlist rate',sub:'Candidates shortlisted per job',color:'#7F77DD'},
    {label:'Outreach reply rate',sub:'% replies to recruiter messages',color:'#D85A30'},
    {label:'Verification speed',sub:'Avg. hours to verify new talent',color:'#BA7517'},
    {label:'Pipeline conversion',sub:'Longlist → placement rate',color:'#534AB7'}
  ];
  var kpiCards=kpis.map(function(k){
    return '<div style="border-radius:10px;padding:12px 14px;background:var(--color-background-secondary);border-left:3px solid '+k.color+';">'
      +'<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:4px">'+k.sub+'</div>'
      +'<div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">'+k.label+'</div>'
    +'</div>';
  }).join('');
  var dash=[
    {icon:'<rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor"/><rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor" opacity=".5"/><rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor" opacity=".5"/><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" opacity=".25"/>',l:'Admin overview',d:'Community health, open roles, pending verifications, recent activity — all at a glance on the main dashboard panel'},
    {icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="21" x2="23" y2="19"/><line x1="19" y1="21" x2="19" y2="17"/><line x1="15" y1="21" x2="15" y2="15"/>',l:'Recruiter KPI leaderboard',d:'Per-recruiter performance metrics ranked side by side — jobs filled, time to fill, outreach response rates, and pipeline activity'},
    {icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',l:'Live pipeline activity',d:'Real-time view of candidates moving through the pipeline across all recruiters and all roles — spot bottlenecks immediately'},
    {icon:'<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',l:'VMS sync status',d:'Last sync timestamp, any failed syncs, and a count of status changes received from connected VMS systems in the last 24 hours'}
  ];
  var dashCards=dash.map(function(d){
    return '<div style="border-radius:12px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:13px 15px;display:flex;gap:11px;align-items:flex-start;">'
      +'<div style="width:32px;height:32px;border-radius:8px;background:'+p.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+svgI(d.icon,p.color,16)+'</div>'
      +'<div><div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px">'+d.l+'</div><div style="font-size:11px;color:var(--color-text-secondary);line-height:1.5">'+d.d+'</div></div>'
    +'</div>';
  }).join('');
  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 6 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">The admin dashboard goes beyond the recruiter view — it adds team-level KPIs, per-recruiter performance ranking, and a live cross-community activity view.</div>'
    +'<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Recruiter KPIs tracked</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;">'+kpiCards+'</div>'
    +'<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Dashboard panels</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">'+dashCards+'</div>'
    +nextCard('Continue to roles & permissions','Create custom roles and configure access — Phase 7',6);
}

/* Phase 6 — Roles & Permissions */
function ph6(){
  var p=PH[6];
  var roles=[
    {id:'admin',  label:'Admin',    color:'#534AB7',bg:'#EEEDFE',fixed:true},
    {id:'rec',    label:'Recruiter',color:'#185FA5',bg:'#E6F1FB',fixed:true},
    {id:'mkt',    label:'Marketing',color:'#D85A30',bg:'#FAECE7',fixed:false},
    {id:'report', label:'Reporter', color:'#BA7517',bg:'#FAEEDA',fixed:false},
  ];
  var pages=[
    {label:'Dashboard',         admin:true, rec:true,  mkt:false, report:true},
    {label:'Community',         admin:true, rec:true,  mkt:true,  report:false},
    {label:'Jobs',              admin:true, rec:true,  mkt:true,  report:false},
    {label:'Candidates',        admin:true, rec:true,  mkt:false, report:false},
    {label:'Pipeline',          admin:true, rec:true,  mkt:false, report:false},
    {label:'Reports',           admin:true, rec:false, mkt:false, report:true},
    {label:'Company settings',  admin:true, rec:false, mkt:false, report:false},
    {label:'Branding',          admin:true, rec:false, mkt:true,  report:false},
    {label:'Job boards',        admin:true, rec:false, mkt:true,  report:false},
    {label:'User management',   admin:true, rec:false, mkt:false, report:false},
  ];
  var roleHtml=roles.map(function(r){
    var sel=selRole===r.id;
    return '<div class="role-pill '+(sel?'sel':'')+'" style="background:'+(sel?r.bg:'var(--color-background-secondary)')+';border-color:'+(sel?r.color:'var(--color-border-secondary)')+';color:'+(sel?r.color:'var(--color-text-secondary)')+';" onclick="sR(\''+r.id+'\')">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+r.color+'"></div>'
      +r.label+(r.fixed?'':' <span style="font-size:9px;opacity:.6">(custom)</span>')
    +'</div>';
  }).join('');

  var roleMap={admin:'admin',rec:'rec',mkt:'mkt',report:'report'};
  var cur_role_key=roleMap[selRole]||'admin';
  var permRows=pages.map(function(pg){
    var on=pg[cur_role_key]===true;
    var bg=on?'#E1F5EE':'var(--color-background-secondary)';
    var dotColor=on?'#1D9E75':'var(--color-border-secondary)';
    var labelColor=on?'var(--color-text-primary)':'var(--color-text-tertiary)';
    return '<div style="border-radius:9px;padding:9px 12px;border:0.5px solid '+(on?'#5DCAA5':'var(--color-border-tertiary)')+';background:'+bg+';display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-size:11px;font-weight:500;color:'+labelColor+'">'+pg.label+'</span>'
      +'<div style="width:32px;height:18px;border-radius:9px;background:'+(on?'#1D9E75':'var(--color-border-secondary)')+';position:relative;flex-shrink:0;">'
        +'<div style="position:absolute;top:2px;left:'+(on?'14px':'2px')+';width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;"></div>'
      +'</div>'
    +'</div>';
  }).join('');

  return '<div class="ph-eyebrow" style="color:'+p.color+'">Phase 7 of 7</div>'
    +'<div class="ph-title">'+p.label+'</div>'
    +'<div class="ph-desc">The platform supports configurable roles beyond Admin and Recruiter. Admins can create custom roles — like Marketing or Reporter — and define exactly which pages and features each role can access.</div>'
    +'<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Select a role to see its access</div>'
    +'<div class="role-row">'+roleHtml+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;">'+permRows+'</div>'
    +'<div style="border-radius:12px;padding:13px 18px;background:'+p.bg+';border:0.5px solid '+p.color+'30;margin-bottom:4px;">'
      +'<div style="font-size:12px;font-weight:500;color:'+p.text+';margin-bottom:6px">Creating a new custom role</div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;">'
        +'<div style="font-size:11px;color:'+p.text+'99;display:flex;gap:7px;align-items:flex-start;"><span style="color:'+p.color+';font-weight:500;flex-shrink:0">1.</span>Admin navigates to User Management → Roles → Create role</div>'
        +'<div style="font-size:11px;color:'+p.text+'99;display:flex;gap:7px;align-items:flex-start;"><span style="color:'+p.color+';font-weight:500;flex-shrink:0">2.</span>Name the role (e.g. "Marketing") and add a description</div>'
        +'<div style="font-size:11px;color:'+p.text+'99;display:flex;gap:7px;align-items:flex-start;"><span style="color:'+p.color+';font-weight:500;flex-shrink:0">3.</span>Toggle on/off access to each page and feature — granular control per module</div>'
        +'<div style="font-size:11px;color:'+p.text+'99;display:flex;gap:7px;align-items:flex-start;"><span style="color:'+p.color+';font-weight:500;flex-shrink:0">4.</span>Save and assign the role when inviting new users — they see only what their role permits</div>'
      +'</div>'
    +'</div>';
}

var RENDERS=[ph0,ph1,ph2,ph3,ph4,ph5,ph6];

function renderProg(){
  var h='';
  PH.forEach(function(p,i){
    var done=i<cur,active=i===cur;
    var dc=done?p.color:(active?p.color:'');
    var ds='border-color:'+(dc||'var(--color-border-tertiary)')+';'+(done?'background:'+p.color+';':'')+(active?'background:'+p.bg+';color:'+p.text+';border-color:'+p.color+';':'');
    h+='<div class="prog-step" onclick="go('+i+')">'
      +'<div class="prog-dot-wrap">'
        +'<div class="prog-dot '+(done?'done':'')+(active?' active':'')+'" style="'+ds+'">'+(done?'✓':(i+1))+'</div>'
        +'<div class="prog-dot-label" style="color:'+(active?p.color:'var(--color-text-tertiary)')+'">'+p.label+'</div>'
      +'</div></div>';
    if(i<PH.length-1) h+='<div class="prog-connector '+(i<cur?'done':'')+'" style="--ph-c:'+PH[i].color+'"></div>';
  });
  document.getElementById('prog').innerHTML=h;
}

function render(){
  renderProg();
  document.getElementById('content').innerHTML='<div class="phase-body">'+RENDERS[cur]()+foot()+'</div>';
}

function go(i){if(i<0||i>=PH.length)return;cur=i;render();}
function sM(id){selMod=id;render();}
function sR(id){selRole=id;render();}
render();
</script>
</body></html>
